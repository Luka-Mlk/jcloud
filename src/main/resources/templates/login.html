<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sign in — JCloud</title>
  <meta name="description" content="Sign in to JCloud and access your object storage buckets." />
  <link rel="stylesheet" th:href="@{/css/style.css}" />
</head>
<body>

  <div class="auth-wrap">
    <div class="auth-card">

      <!-- Logo -->
      <div class="auth-logo">
        <span class="brand-dot"></span>
        JCloud
      </div>

      <h1 class="auth-title">Welcome back</h1>
      <p class="auth-sub">Sign in to continue to your dashboard.</p>

      <!-- Error alert -->
      <div class="alert alert-error" id="login-error" role="alert"></div>

      <!-- Form -->
      <form id="login-form" novalidate>
        <div class="form-group">
          <label for="email">Email address</label>
          <input
            id="email"
            name="email"
            type="email"
            class="input"
            placeholder="you@example.com"
            autocomplete="email"
            required
          />
        </div>

        <div class="form-group">
          <label for="password">Password</label>
          <input
            id="password"
            name="password"
            type="password"
            class="input"
            placeholder="••••••••"
            autocomplete="current-password"
            required
          />
        </div>

        <button type="submit" class="btn btn-primary btn-full btn-lg" id="submit-btn">
          Sign in
        </button>
      </form>

      <div class="divider-text">or</div>

      <p class="text-muted" style="text-align:center; font-size:0.85rem;">
        Don't have an account?
        <a href="/register">Create one free</a>
      </p>

    </div>
  </div>

  <script type="module">
    import { login, guestGuard, toast } from '/js/api.js';

    guestGuard();

    const form      = document.getElementById('login-form');
    const errorEl   = document.getElementById('login-error');
    const submitBtn = document.getElementById('submit-btn');

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      errorEl.textContent = '';
      errorEl.classList.remove('show');

      const email    = form.email.value.trim();
      const password = form.password.value;

      if (!email || !password) {
        showError('Please fill in all fields.');
        return;
      }

      submitBtn.disabled = true;
      submitBtn.innerHTML = '<span class="spinner"></span> Signing in…';

      try {
        await login(email, password);
        window.location.href = '/dashboard';
      } catch (err) {
        showError(err.message || 'Invalid credentials.');
        submitBtn.disabled = false;
        submitBtn.textContent = 'Sign in';
      }
    });

    function showError(msg) {
      errorEl.textContent = msg;
      errorEl.classList.add('show');
    }
  </script>
</body>
</html>
