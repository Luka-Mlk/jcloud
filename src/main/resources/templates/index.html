<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>JCloud — Object Storage</title>
  <meta name="description" content="JCloud is a developer-first object storage platform. Store, manage, and retrieve your files with a simple API." />
  <link rel="stylesheet" th:href="@{/css/style.css}" />
</head>
<body>

  <!-- Navbar -->
  <nav class="navbar">
    <div class="container">
      <a href="/" class="nav-brand">
        <span class="brand-dot"></span>
        JCloud
      </a>
      <div class="nav-right" id="nav-right">
        <a href="/login"    class="btn btn-ghost btn-sm" id="nav-login">Login</a>
        <a href="/register" class="btn btn-primary btn-sm" id="nav-register">Get Started</a>
      </div>
    </div>
  </nav>

  <!-- Hero -->
  <main>
    <section class="hero">
      <div class="hero-eyebrow">
        <span class="brand-dot" style="width:6px;height:6px;display:inline-block;border-radius:50%;background:var(--brand)"></span>
        Developer-first object storage
      </div>

      <h1 class="hero-title">
        Store anything.<br/>
        <span>Retrieve it anywhere.</span>
      </h1>

      <p class="hero-sub">
        JCloud gives you S3-compatible buckets, chunked uploads, and a clean REST API
        — without the complexity.
      </p>

      <div class="hero-actions">
        <a href="/register" class="btn btn-primary btn-lg" id="cta-register">Start for free</a>
        <a href="/login"    class="btn btn-secondary btn-lg" id="cta-login">Sign in</a>
      </div>

      <!-- Feature pills -->
      <div class="flex gap-4 mt-8" style="flex-wrap:wrap; justify-content:center; margin-top:48px;">
        <span class="badge badge-green">Chunked uploads</span>
        <span class="badge badge-gray">Bucket management</span>
        <span class="badge badge-gray">JWT auth</span>
        <span class="badge badge-gray">Pagination</span>
        <span class="badge badge-green">REST API</span>
      </div>
    </section>
  </main>

  <script type="module">
    import { isAuthenticated } from '/js/api.js';

    // If already logged in, go straight to dashboard
    if (isAuthenticated()) {
      window.location.href = '/dashboard';
    }
  </script>
</body>
</html>
