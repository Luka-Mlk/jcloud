# Database Configuration
spring.datasource.url=jdbc:postgresql://localhost:5432/jcloud
spring.datasource.username=postgres
spring.datasource.password=postgres
spring.jpa.hibernate.ddl-auto=update
spring.data.redis.host=localhost
spring.data.redis.port=6379

spring.servlet.multipart.enabled=false
spring.servlet.multipart.max-file-size=-1
spring.servlet.multipart.max-request-size=-1
spring.threads.virtual.enabled=true

storage.location=./storage

spring.data.web.pageable.default-page-size=20
spring.data.web.pageable.max-page-size=100

# Security Configuration
jcloud.jwt.secret=b4d2f3e9c8a7e6d5c4f3e2d1c0b9a8e7d6f5e4d3c2b1a0f9e8d7c6b5a4d3e2c1
jcloud.jwt.expiration-ms=3600000
jcloud.session.ttl-seconds=5400
