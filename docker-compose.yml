services:
  db:
    image: postgres:15
    environment:
      POSTGRES_DB: jcloud
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - ./data/postgres:/var/lib/postgresql/data
    networks:
      - jcloud-network
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - ./data/redis:/data
    networks:
      - jcloud-network
    command: redis-server --save 60 1 --loglevel warning

networks:
  jcloud-network:
    driver: bridge
